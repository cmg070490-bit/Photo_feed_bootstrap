<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.6.1/font/bootstrap-icons.css">

    <title>Instagram Copy</title>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar bg-light">
        <div class="container d-flex justify-content-between">

            <div>
                <i class="bi bi-instagram"></i>
                <strong>Instagram</strong>
            </div>

            <!-- BOTÓN -->
            <div class="d-flex align-items-center gap-2">

                <!-- CREATE POST -->
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                    Create content
                </button>

                <!-- DROPDOWN -->
                <div class="dropdown">

                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">

                        <i class="bi bi-gear-fill"></i>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">

                        <li><a class="dropdown-item" href="#">Profile</a></li>
                        <li><a class="dropdown-item" href="#">Accesibility</a></li>
                        <li><a class="dropdown-item" href="#">Privacy and Data</a></li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li><a class="dropdown-item text-danger" href="#">Log out</a></li>

                    </ul>

                </div>

            </div>
            </button>

        </div>
    </nav>

    <!-- MODAL (igual que el tuyo, no lo toco mucho) -->
    <div class="modal fade" id="exampleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Create Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <textarea class="form-control mb-2" placeholder="Sube texto"></textarea>

                    <button class="btn btn-secondary">
                        <i class="bi bi-camera"></i>
                    </button>

                    <button class="btn btn-secondary">
                        <i class="bi bi-geo-alt"></i>
                    </button>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-success">Save changes</button>
                </div>

            </div>
        </div>
    </div>

    <!-- PILL NAV -->
    <ul class="nav nav-pills justify-content-center mt-3">

        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#grid-view">
                <i class="bi bi-grid-3x3-gap"></i>
            </button>
        </li>

        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#feed-view">
                <i class="bi bi-file-fill"></i>
            </button>
        </li>

    </ul>

    <!-- TAB CONTENT -->
    <div class="tab-content mt-4">

        <!-- GRID -->
        <div class="tab-pane fade show active" id="grid-view">

            <div class="container">
                <div class="row g-2">

                    <!-- IMÁGENES GRID -->
                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?1">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?2">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?3">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?4">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?5">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?6">
                    </div>
                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?7">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?8">
                    </div>

                    <div class="col-4">
                        <img class="img-fluid" src="https://picsum.photos/500?9">
                    </div>

                </div>
            </div>

        </div>

        <!-- FEED -->
        <div class="tab-pane fade" id="feed-view">

            <div class="container col-lg-6">

                <!-- POST -->
                <div class="card mb-4">

                    <div class="card-header d-flex justify-content-between">
                        <strong>My Crazy dog Spark!</strong>
                        <span>08/26</span>
                    </div>

                    <img class="card-img-top" src="https://picsum.photos/600/400">

                    <div class="card-body">
                        <p><strong>204 Likes</strong></p>
                        <p>This is an example of a very good photo.</p>
                    </div>

                </div>

                <!-- POST 3 -->
                <div class="card mb-4">

                    <div class="card-header d-flex justify-content-between">
                        <strong>New Picture</strong>
                        <span>04/09</span>
                    </div>

                    <img class="card-img-top" src="https://picsum.photos/600/401">

                    <div class="card-body">
                        <p><strong>26985 Likes</strong></p>
                        <p>Beautiful travel photo example.</p>
                    </div>

                </div>

                <div class="card mb-4">

                    <div class="card-header d-flex justify-content-between">
                        <strong>Amazing view!</strong>
                        <span>06/10</span>
                    </div>

                    <img class="card-img-top" src="https://picsum.photos/600/402">

                    <div class="card-body">
                        <p><strong>26985 Likes</strong></p>
                        <p>Beautiful travel photo example.</p>
                    </div>

                </div>
            </div>

        </div>

    </div>

    <!-- BOOTSTRAP JS (OBLIGATORIO) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
